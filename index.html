<!DOCTYPE html>
<html>
<head>
<title>ABD Saatleri</title>
<style>
body{background:#111;color:white;font-family:sans-serif;text-align:center}
.card{background:#222;padding:20px;margin:10px;border-radius:10px}
</style>
</head>
<body>

<h1>ABD Saat Dilimleri</h1>

<div class="card">New York: <span id="ny"></span></div>
<div class="card">Illinois: <span id="il"></span></div>
<div class="card">Arizona: <span id="az"></span></div>
<div class="card">California: <span id="ca"></span></div>
<div class="card">Alaska: <span id="ak"></span></div>
<div class="card">Hawaii: <span id="hi"></span></div>

<script>
function update(){
document.getElementById("ny").innerText=new Date().toLocaleTimeString("en-US",{timeZone:"America/New_York"})
document.getElementById("il").innerText=new Date().toLocaleTimeString("en-US",{timeZone:"America/Chicago"})
document.getElementById("az").innerText=new Date().toLocaleTimeString("en-US",{timeZone:"America/Phoenix"})
document.getElementById("ca").innerText=new Date().toLocaleTimeString("en-US",{timeZone:"America/Los_Angeles"})
document.getElementById("ak").innerText=new Date().toLocaleTimeString("en-US",{timeZone:"America/Anchorage"})
document.getElementById("hi").innerText=new Date().toLocaleTimeString("en-US",{timeZone:"Pacific/Honolulu"})
}
setInterval(update,1000)
update()
</script>

</body>
</html>
